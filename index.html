<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dentalic - Login</title>
    <!-- Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.0/dist/tailwind.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen flex items-center justify-center p-6">

    <!-- Top Lang Toggle -->
    <div class="fixed top-6 right-6 z-50">
        <button onclick="toggleLanguage()" id="lang-toggle-btn"
            class="text-[10px] font-black uppercase tracking-widest px-4 py-2 bg-white dark:bg-zinc-900 border-2 border-zinc-900 dark:border-zinc-100 hover:translate-x-0.5 hover:translate-y-0.5 brutalist-shadow transition-all active:translate-x-1 active:translate-y-1">
            العربية
        </button>
    </div>

    <div class="w-full max-w-sm animate-fade-in-up">
        <!-- Logo/Header -->
        <div class="text-center mb-12">
            <div
                class="w-16 h-16 bg-blue-600 dark:bg-yellow-400 border-2 border-zinc-900 dark:border-zinc-100 flex items-center justify-center mx-auto mb-4 rotate-3 brutalist-shadow" style="width: 64px; height: 64px;">
                <i class="fa-solid fa-tooth text-white dark:text-zinc-900 text-3xl" style="font-size: 30px;"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter uppercase mb-1">Dentalic</h1>
            <p class="text-zinc-500 dark:text-zinc-400 font-bold text-xs uppercase tracking-widest"
                data-i18n="login-subtitle">Clinic Management System</p>
        </div>

        <form id="login-form" class="flex flex-col gap-6">
            <!-- Username Field -->
            <div class="group relative">
                <label for="username"
                    class="block mb-1 text-[10px] font-black uppercase tracking-widest text-zinc-500 dark:text-zinc-400"
                    data-i18n="username">
                    Username
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-5 h-5 text-zinc-900 dark:text-white icon-size" width="20" height="20" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207">
                            </path>
                        </svg>
                    </div>
                    <input type="text" id="username" required
                        class="block w-full ltr:pl-10 rtl:pr-10 p-3.5 bg-white text-zinc-900 font-bold text-sm border-2 border-zinc-900 focus:outline-none focus:ring-0 focus:border-blue-600 dark:bg-zinc-900 dark:text-white dark:border-zinc-100 dark:focus:border-yellow-400 transition-colors duration-200 ease-in-out"
                        placeholder="" data-i18n-placeholder="username-placeholder">
                    <div
                        class="absolute top-0 left-0 w-full h-full bg-zinc-200 -z-10 translate-x-1.5 translate-y-1.5 border-2 border-transparent dark:bg-zinc-800 transition-transform group-focus-within:translate-x-2.5 group-focus-within:translate-y-2.5">
                    </div>
                </div>
            </div>

            <!-- Password Field -->
            <div class="group relative">
                <label for="password"
                    class="block mb-1 text-[10px] font-black uppercase tracking-widest text-zinc-500 dark:text-zinc-400"
                    data-i18n="password">
                    Password
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-5 h-5 text-zinc-900 dark:text-white icon-size" width="20" height="20" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                    </div>
                    <input type="password" id="password" required
                        class="block ltr:pl-10 rtl:pr-10 w-full p-3.5 bg-white text-zinc-900 font-bold text-sm border-2 border-zinc-900 focus:outline-none focus:ring-0 focus:border-blue-600 dark:bg-zinc-900 dark:text-white dark:border-zinc-100 dark:focus:border-yellow-400 transition-colors duration-200 ease-in-out"
                        placeholder="••••••••">
                    <div
                        class="absolute top-0 left-0 w-full h-full bg-zinc-200 -z-10 translate-x-1.5 translate-y-1.5 border-2 border-transparent dark:bg-zinc-800 transition-transform group-focus-within:translate-x-2.5 group-focus-within:translate-y-2.5">
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div id="error-message"
                class="text-[10px] font-black text-red-600 dark:text-red-400 uppercase tracking-widest text-center min-h-[1.5em]">
            </div>

            <button type="submit" id="login-btn" class="relative inline-block w-full group mt-2">
                <span
                    class="absolute top-0 left-0 w-full h-full transition-all duration-200 ease-out transform translate-x-1.5 translate-y-1.5 bg-blue-600 dark:bg-yellow-400 border-2 border-zinc-900 dark:border-zinc-100 group-hover:translate-x-0 group-hover:translate-y-0"></span>
                <span
                    class="relative flex items-center justify-center gap-3 w-full px-5 py-3.5 text-xs font-black tracking-widest uppercase border-2 border-zinc-900 bg-white text-zinc-900 dark:bg-zinc-900 dark:text-white dark:border-zinc-100">
                    <span class="spinner hidden"></span>
                    <span class="btn-text" data-i18n="login-btn">Enter System</span>
                </span>
            </button>
        </form>
    </div>

    <script src="js/core.js"></script>
    <script>
        // Set initial direction
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

        // Wrap toggleLanguage to handle direction
        const originalToggle = window.toggleLanguage;
        window.toggleLanguage = function() {
            if (typeof originalToggle === 'function') originalToggle();
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        };

        // Update i18n keys for this design
        Object.assign(translations.en, {
            'login-subtitle': 'Clinic Management System',
            'username': 'Username',
            'password': 'Password',
            'login-btn': 'Enter System',
            'username-placeholder': 'Enter your username'
        });
        Object.assign(translations.ar, {
            'login-subtitle': 'نظام إدارة العيادات',
            'username': 'اسم المستخدم',
            'password': 'كلمة المرور',
            'login-btn': 'دخول النظام',
            'username-placeholder': 'أدخل اسم المستخدم'
        });
    </script>
</body>

</html>
